<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUU</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui,
          sans-serif;
        background: #f7f4ec;
        color: #443d34;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(circle at 50% 76%, rgba(129, 168, 148, 0.18), transparent 28rem),
          linear-gradient(180deg, #f6f7ee 0%, #ece7dc 100%);
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .wordmark {
        position: fixed;
        left: clamp(18px, 4vw, 42px);
        bottom: clamp(16px, 4vw, 34px);
        font-size: clamp(16px, 2vw, 22px);
        letter-spacing: 0;
        color: rgba(68, 61, 52, 0.56);
        user-select: none;
      }

      .loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(68, 61, 52, 0.64);
        font-size: 14px;
      }

      .is-ready .loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="MUU"></main>
    <div class="wordmark" aria-hidden="true">muu</div>
    <div class="loading" aria-live="polite">muu</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
